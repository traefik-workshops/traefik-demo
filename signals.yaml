# signals.yaml — keyword index for catalog.json
#
# Maps every leaf module / chart path to the keywords that should trigger it
# when /extract-scenario reads a prospect's email or transcript. Agents
# should compare normalized prospect tokens against these keywords and rank
# matches.
#
# Keep entries lower-case. Multi-word phrases are matched as substrings.
# When a module is added, add its keywords here (CI will warn on drift).
#
# Charts also get their official `keywords:` from Chart.yaml — discover.py
# merges both. This file is for the *extra* synonyms (prospect lingo,
# common typos, marketing names) that don't belong in Chart.yaml.

